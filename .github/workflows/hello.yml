# This is workflow name
name: Hello

on:
  workflow_dispatch:
    

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: say hello to user
        run: echo "Hello bhai"

      - name: say hello to username
        run: echo "hello $USER"

  details:
    runs-on: ubuntu-latest
    steps:
      - name: show what is the version of the python and docker
        run: python --version && docker --version

